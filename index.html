<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Tracker</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>

    <header>

        <h1>Pomodoro Tracker</h1>
        <img id="settings" src="cog.svg" alt="A cog">

    </header>

    <main>
        
        <div id="pomodoro__counter">

            <div id="pomodoro__buttons">

                <div class="pomodoro__button">
                    <button id="pomodoro__timer" class="btn">Pomodoro</button>
                </div>
                <div class="pomodoro__button">
                    <button id="short__break-timer" class="btn">Short Break</button>
                </div>
                <div class="pomodoro__button">
                    <button id="long__break-timer" class="btn">Long Break</button>
                </div>

            </div>

            <div id="counter__container">
                <h1 id="counter">25:00</h1>
            </div>

            <div id="counter__buttons">
                <button id="start" class="btn">Start</button>
            </div>

        </div>

        <div id="tasks">

            <button type="submit" class="btn" id="task__button">Add Task</button>

            <div id="todo__tasks">

            </div>

        </div>
    </main>
   
    <div class="modal__overlay hidden">
        <div class="modal__container">
            <h2>This is a modal</h2>

            <div id="web__settings">
                <input type="text" name="colour__settings" id="colour__settings">
                <button type="submit" id="colour__button">Submit</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
