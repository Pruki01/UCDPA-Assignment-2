<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Tracker</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
    <header>

        <h1>Pomodoro Tracker</h1>
        <svg id="settings" viewBox="0 0 24 24" version="1.2" baseProfile="tiny" xmlns="http://www.w3.org/2000/svg"><path d="M9.387 17.548l.371 1.482c.133.533.692.97 1.242.97h1c.55 0 1.109-.437 1.242-.97l.371-1.482c.133-.533.675-.846 1.203-.694l1.467.42c.529.151 1.188-.114 1.462-.591l.5-.867c.274-.477.177-1.179-.219-1.562l-1.098-1.061c-.396-.383-.396-1.008.001-1.39l1.096-1.061c.396-.382.494-1.084.22-1.561l-.501-.867c-.275-.477-.933-.742-1.461-.591l-1.467.42c-.529.151-1.07-.161-1.204-.694l-.37-1.48c-.133-.532-.692-.969-1.242-.969h-1c-.55 0-1.109.437-1.242.97l-.37 1.48c-.134.533-.675.846-1.204.695l-1.467-.42c-.529-.152-1.188.114-1.462.59l-.5.867c-.274.477-.177 1.179.22 1.562l1.096 1.059c.395.383.395 1.008 0 1.391l-1.098 1.061c-.395.383-.494 1.085-.219 1.562l.501.867c.274.477.933.742 1.462.591l1.467-.42c.528-.153 1.07.16 1.203.693zm2.113-7.048c1.104 0 2 .895 2 2 0 1.104-.896 2-2 2s-2-.896-2-2c0-1.105.896-2 2-2z"/></svg>
    </header>

    <main>
        
        <div id="pomodoro__counter">

            <div id="pomodoro__buttons">

                <div class="pomodoro__button">
                    <button id="pomodoro__timer" class="btn">Pomodoro</button>
                </div>
                <div class="pomodoro__button">
                    <button id="short__break-timer" class="btn">Short Break</button>
                </div>
                <div class="pomodoro__button">
                    <button id="long__break-timer" class="btn">Long Break</button>
                </div>

            </div>

            <div id="counter__container">
                <h1 id="counter">25:00</h1>
            </div>

            <div id="counter__buttons">
                <button id="start" class="btn">Start</button>
            </div>

        </div>

        <div id="tasks">

            <button class="btn" id="task__button">Add Task</button>

            <div id="todo__tasks">

            </div>

        </div>
    </main>
   
    <div class="modal__overlay hidden">
        <div class="modal__container">
            <h2>This is a modal</h2>
            <div id="web__settings">
                <input type="text" name="colour__settings" id="colour__settings">
                <button type="submit" id="colour__button">Submit</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
